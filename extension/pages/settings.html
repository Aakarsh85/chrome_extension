<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:40px;
}

.container{
    max-width:600px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

select{
    width:100%;
    padding:8px;
    margin-top:8px;
}

button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

</style>

</head>

<body>

<div class="container">

<h2>Extension Settings</h2>

<div class="card">

<label>Default Bookmark Group</label>

<select>

<option>Coding</option>
<option>Research</option>
<option>Learning</option>
<option>Shopping</option>
<option>General</option>

</select>

</div>

<div class="card">

<label>Theme</label>

<select>

<option>Light</option>
<option>Dark</option>

</select>

</div>

<div class="card">

<button>Export Bookmarks</button>

</div>

</div>

</body>

</html>
