<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2> Bookmarks</h2>

    <button onclick="showSection('home')">Dashboard</button>
    <button onclick="showSection('account')">Account</button>
    <button onclick="showSection('settings')">Settings</button>
    <button onclick="showSection('help')">Help</button>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Dashboard Section -->
    <div id="home" class="section">
      <h2>All Bookmarks</h2>

      <div class="controls">
        <input type="text" id="search" placeholder=" Search bookmarks...">
        <input type="text" id="tagSearch" placeholder="Filter by tags..."> <!-- 🔥 NEW (for tag wise searching)-->
        <select id="groupFilter">
          <option value="all">All Groups</option>
        </select>
      </div>

      <div id="bookmarkContainer"></div>
    </div>

    <!-- Account Section -->
    <div id="account" class="section hidden">
      <h2>Account</h2>

      <p id="userStatus">You are logged in</p>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <!-- Settings -->
    <div id="settings" class="section hidden">
      <h2>Settings</h2>
      <p>Preferences coming soon...</p>
    </div>

    <!-- Help -->
    <div id="help" class="section hidden">
      <h2>Help</h2>
      <p>Use this extension to save and manage your bookmarks easily.</p>
      <ul>
        <li>Click "Save" in popup to store bookmarks</li>
        <li>Use search and filters to find bookmarks</li>
        <li>Edit or delete anytime</li>
      </ul>
    </div>

  </div>

</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
