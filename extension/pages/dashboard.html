<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2> Bookmarks</h2>

    <button onclick="showSection('home')"> Dashboard</button>
    <button onclick="showSection('account')"> Account</button>
    <button onclick="showSection('settings')"> Settings</button>
    <button onclick="showSection('help')"> Help</button>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Dashboard Section -->
    <div id="home" class="section">
      <h2>All Bookmarks</h2>

      <input type="text" id="search" placeholder="Search...">
      <select id="groupFilter"></select>

      <div id="bookmarkContainer"></div>
    </div>

    <!-- Account -->
    <div id="account" class="section hidden">
      <h2>Account</h2>
      <p>User info coming soon...</p>
    </div>

    <!-- Settings -->
    <div id="settings" class="section hidden">
      <h2>Settings</h2>
      <p>Dark mode, preferences...</p>
    </div>

    <!-- Help -->
    <div id="help" class="section hidden">
      <h2>Help</h2>
      <p>Instructions and guide...</p>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
